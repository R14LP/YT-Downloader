<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    width: 200px;
    padding: 12px;
    background: #0c0f14;
    color: #e8eaf0;
    font-family: 'Space Mono', monospace, sans-serif;
    font-size: 11px;
  }
  .title { font-size: 13px; font-weight: 700; margin-bottom: 12px; letter-spacing: 1px; }
  .title span { color: #d42b2b; }
  button {
    width: 100%;
    background: #d42b2b;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  button:hover { background: #b82424; }
  .shortcut-label { color: #4a5568; margin-bottom: 4px; letter-spacing: 1px; font-size: 9px; }
  input {
    width: 100%;
    background: #111620;
    border: 1px solid #252e40;
    border-radius: 5px;
    color: #e8eaf0;
    padding: 6px 8px;
    font-family: inherit;
    font-size: 11px;
    box-sizing: border-box;
    margin-bottom: 6px;
  }
  input:focus { outline: none; border-color: #8a1a1a; }
  .saved { color: #1db954; font-size: 9px; display: none; }
</style>
</head>
<body>
<div class="title">GR<span>.</span>AB</div>
<button id="send-btn">Send current page</button>
<div class="shortcut-label">SHORTCUT</div>
<input type="text" id="shortcut-input" placeholder="Alt+D">
<button id="save-btn" style="background:#111620;border:1px solid #252e40;color:#8892a4;">Save shortcut</button>
<div class="saved" id="saved-msg">Saved!</div>

<script>
chrome.storage.sync.get(['shortcut'], r => {
  document.getElementById('shortcut-input').value = r.shortcut || 'Alt+D';
});

document.getElementById('send-btn').addEventListener('click', () => {
  chrome.tabs.query({ active: true, currentWindow: true }, tabs => {
    chrome.runtime.sendMessage({ action: 'send_to_app', url: tabs[0].url });
    window.close();
  });
});

document.getElementById('save-btn').addEventListener('click', () => {
  const val = document.getElementById('shortcut-input').value.trim() || 'Alt+D';
  chrome.storage.sync.set({ shortcut: val }, () => {
    const msg = document.getElementById('saved-msg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 1500);
  });
});
</script>
</body>
</html>
